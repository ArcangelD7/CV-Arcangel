<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Rafael Figueredo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ececec;
      font-family: 'Montserrat', sans-serif;
      padding: 30px;
    }

    .cv {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 38% 62%;
      background: #f5f5f5;
      min-height: 1400px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .left {
      background: #b8d0df;
      padding: 50px 25px;
      position: relative;
      color: #000;
    }

    .photo {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 12px solid #fff;
      overflow: hidden;
      margin: auto;
      background: #ddd;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      margin-top: 40px;
      text-align: left;
      padding-left: 15px;
    }

    .name h1 {
      font-size: 64px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 2px;
    }

    .name p {
      margin-top: 25px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .contact {
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .contact-box {
      background: #1e1e22;
      color: white;
</html>
